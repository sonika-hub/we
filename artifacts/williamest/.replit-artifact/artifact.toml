kind = "web"
previewPath = "/"
title = "WILLIAMEST Portfolio"
version = "1.0.0"
id = "artifacts/williamest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25791

[services.development]
run = "pnpm --filter @workspace/williamest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/williamest", "run", "build" ]
publicDir = "artifacts/williamest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25791"
BASE_PATH = "/"
